name: Publish plugin to consumer repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave blank to just sync main.'
        required: false
        default: ''

jobs:
  subtree-split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Do not persist the default GITHUB_TOKEN as a git credential — we
          # authenticate explicitly with CONSUMER_REPO_TOKEN below, and leaving
          # the default helper installed causes it to win on cross-repo push.
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Split plugin subtree
        run: |
          git subtree split --prefix=plugin -b plugin-only
          echo "Split commit: $(git rev-parse plugin-only)"

      - name: Force-push split branch to consumer repo main
        env:
          CONSUMER_TOKEN: ${{ secrets.CONSUMER_REPO_TOKEN }}
        run: |
          git push --force \
            "https://x-access-token:${CONSUMER_TOKEN}@github.com/yuki-is-taka/uemcp.git" \
            plugin-only:main

      - name: Propagate tag to consumer repo
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        env:
          CONSUMER_TOKEN: ${{ secrets.CONSUMER_REPO_TOKEN }}
          TAG: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
        run: |
          git tag -f "${TAG}" plugin-only
          git push --force \
            "https://x-access-token:${CONSUMER_TOKEN}@github.com/yuki-is-taka/uemcp.git" \
            "refs/tags/${TAG}"
