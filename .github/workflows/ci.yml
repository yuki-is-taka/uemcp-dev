name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shim:
    name: Shim (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w @yuki-is-taka/uemcp
      - run: npm run build -w @yuki-is-taka/uemcp
