name: Verify secrets

# Manual-only sanity check: confirms CONSUMER_REPO_TOKEN can reach the
# consumer repo, and NPM_TOKEN authenticates to npm as yuki-is-taka.
# No side effects (no push, no publish).
#
# Run: gh workflow run verify-secrets.yml --repo yuki-is-taka/uemcp-dev

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CONSUMER_REPO_TOKEN (read-only ls-remote)
        env:
          TOKEN: ${{ secrets.CONSUMER_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CONSUMER_REPO_TOKEN is not set"
            exit 1
          fi
          echo "Attempting ls-remote on yuki-is-taka/uemcp..."
          git ls-remote "https://x-access-token:${TOKEN}@github.com/yuki-is-taka/uemcp.git" HEAD
          echo "CONSUMER_REPO_TOKEN OK"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify NPM_TOKEN (whoami)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is not set"
            exit 1
          fi
          WHO=$(npm whoami)
          echo "npm whoami: $WHO"
          if [ "$WHO" != "yuki-is-taka" ]; then
            echo "::error::Expected npm user 'yuki-is-taka', got '$WHO'"
            exit 1
          fi
          echo "NPM_TOKEN OK"
